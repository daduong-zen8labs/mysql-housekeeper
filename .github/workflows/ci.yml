name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Unit tests
        run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m
      - name: Build
        run: go build -o mysql-housekeeper ./cmd/mysql-housekeeper

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Start MySQL
        run: docker compose up -d --wait
      - name: Integration tests
        run: go test -tags=integration ./internal/mover/ -count=1 -v
        env:
          PRIMARY_DSN: "housekeeper:housekeeper@tcp(127.0.0.1:13306)/app?parseTime=true&loc=UTC"
          HOUSEKEEPING_DSN: "housekeeper:housekeeper@tcp(127.0.0.1:13307)/archive?parseTime=true&loc=UTC"
      - name: Tear down
        if: always()
        run: docker compose down -v
