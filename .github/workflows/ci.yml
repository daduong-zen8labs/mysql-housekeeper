name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22.x", "1.23.x", "1.24.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Unit tests with race
        run: go test -race ./... -count=1
      - name: Coverage
        if: matrix.go == '1.24.x'
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out
      - name: golangci-lint
        if: matrix.go == '1.24.x'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v1.64.8
          args: --timeout=5m
      - name: govulncheck
        if: matrix.go == '1.24.x'
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Informational: current tooling often flags unfixed stdlib call-graph noise.
          govulncheck ./...
      - name: Build
        run: go build -o mysql-housekeeper ./cmd/mysql-housekeeper
      - name: Trivy filesystem scan
        if: matrix.go == '1.24.x'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Start MySQL
        run: docker compose up -d --wait
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: Integration tests
        run: go test -tags=integration ./internal/mover/ -count=1 -v
        env:
          PRIMARY_DSN: "housekeeper:housekeeper@tcp(127.0.0.1:13306)/app?parseTime=true&loc=UTC"
          HOUSEKEEPING_DSN: "housekeeper:housekeeper@tcp(127.0.0.1:13307)/archive?parseTime=true&loc=UTC"
      - name: Tear down
        if: always()
        run: docker compose down -v
